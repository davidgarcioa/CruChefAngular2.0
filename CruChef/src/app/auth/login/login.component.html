<app-auth-shell
  eyebrow="Bienvenido"
  title="Inicia sesion"
  subtitle="Accede a tu panel para administrar categorias, platos y pedidos del ecosistema CruChef."
  alternateText="Todavia no tienes cuenta?"
  alternateLabel="Registrate"
  alternateRoute="/register"
>
  <section class="auth-card">
    <div class="card-copy">
      <h2>Acceso</h2>
      <p>Ingresa tu correo y tu contrasena.</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      @if (noticeMessage()) {
        <p class="status-message status-message--success">{{ noticeMessage() }}</p>
      }

      @if (warningMessage()) {
        <p class="status-message status-message--warning">{{ warningMessage() }}</p>
      }

      @if (errorMessage()) {
        <p class="status-message status-message--error">{{ errorMessage() }}</p>
      }

      <label class="field">
        <span>Correo electronico</span>
        <input type="email" formControlName="email" placeholder="correo@cruchef.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small>Ingresa un correo valido.</small>
        }
      </label>

      <label class="field">
        <span>Contrasena</span>
        <input type="password" formControlName="password" placeholder="Minimo 6 caracteres" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small>La contrasena debe tener al menos 6 caracteres.</small>
        }
      </label>

      <button type="submit" class="submit-button" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Validando...' : 'Entrar' }}
      </button>
    </form>
  </section>
</app-auth-shell>
