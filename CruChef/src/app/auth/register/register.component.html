<app-auth-shell
  eyebrow="Crea tu cuenta"
  title="Registro"
  subtitle="Completa tus datos para crear acceso al panel administrativo de CruChef."
  alternateText="Ya tienes cuenta?"
  alternateLabel="Inicia sesi&oacute;n"
  alternateRoute="/login"
>
  <section class="auth-card">
    <div class="card-copy">
      <h2>Registro</h2>
      <p>Solicitamos los datos b&aacute;sicos para crear el acceso.</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      @if (errorMessage()) {
        <p class="status-message status-message--error">{{ errorMessage() }}</p>
      }

      <label class="field">
        <span>Nombre completo</span>
        <input type="text" formControlName="fullName" placeholder="Tu nombre" />
        @if (form.controls.fullName.touched && form.controls.fullName.invalid) {
          <small>Ingresa un nombre v&aacute;lido.</small>
        }
      </label>

      <label class="field">
        <span>Correo electr&oacute;nico</span>
        <input type="email" formControlName="email" placeholder="correo@cruchef.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small>Ingresa un correo v&aacute;lido.</small>
        }
      </label>

      <label class="field">
        <span>N&uacute;mero de documento</span>
        <input type="text" formControlName="documentNumber" placeholder="Documento" />
        @if (form.controls.documentNumber.touched && form.controls.documentNumber.invalid) {
          <small>Ingresa un n&uacute;mero de documento v&aacute;lido.</small>
        }
      </label>

      <label class="field">
        <span>Contrase&ntilde;a</span>
        <input type="password" formControlName="password" placeholder="M&iacute;nimo 6 caracteres" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small>La contrase&ntilde;a debe tener al menos 6 caracteres.</small>
        }
      </label>

      <label class="field">
        <span>Confirmar contrase&ntilde;a</span>
        <input type="password" formControlName="confirmPassword" placeholder="Repite tu contrase&ntilde;a" />
        @if (form.controls.confirmPassword.touched && form.controls.confirmPassword.invalid) {
          <small>Confirma tu contrase&ntilde;a.</small>
        } @else if (form.touched && form.hasError('passwordMismatch')) {
          <small>Las contrase&ntilde;as no coinciden.</small>
        }
      </label>

      <button type="submit" class="submit-button" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="alternate-copy">
      &iquest;Ya tienes cuenta?
      <a routerLink="/login" class="alternate-link">Inicia sesi&oacute;n</a>
    </p>
  </section>
</app-auth-shell>
